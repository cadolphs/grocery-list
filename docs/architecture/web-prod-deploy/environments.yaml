# environments.yaml — consumed by DISTILL for Mandate 4 (Environmental Realism)
# Feature: web-prod-deploy
#
# This feature does NOT install into user systems. It deploys a static web
# bundle from CI to a managed hosting provider. The "environments" are CI
# runner + hosting provider + developer laptop for manual fallback.

target_environments:
  - name: ci-runner
    description: "GitHub Actions ubuntu-latest runner executing deploy-web.yml"
    platform: [linux]
    preconditions:
      - "GitHub secret FIREBASE_SERVICE_ACCOUNT is set"
      - ".github/workflows/ci.yml has completed with conclusion=success on the same SHA"
      - "firebase.json and .firebaserc exist at repo root"

  - name: firebase-hosting-prod
    description: "Firebase Hosting project grocery-list-cad, channel=live"
    platform: [managed-cloud]
    preconditions:
      - "Firebase Hosting is initialized for project grocery-list-cad"
      - "Service account github-actions-deploy@grocery-list-cad.iam.gserviceaccount.com exists with role Firebase Hosting Admin"

  - name: laptop-fallback
    description: "Developer laptop performing manual `firebase deploy --only hosting` when CI fails"
    platform: [macos, linux]
    preconditions:
      - "firebase CLI installed (npm i -g firebase-tools or equivalent)"
      - "Logged in via `firebase login` with an account that has Hosting Admin on the project"
      - "Clean checkout of main at the SHA to be deployed"

coexistence_matrix:
  - tool: .github/workflows/ci.yml
    must_not_break: true
    note: "Quality gate is untouched by this feature; deploy workflow only chains via workflow_run"
  - tool: .github/workflows/mutation.yml
    must_not_break: true
    note: "Unrelated; runs in parallel on same push to main"
  - tool: firebase (Auth + Firestore) for same project
    must_not_break: true
    note: "Hosting deploy must not touch Firestore rules, Auth config, or other services on the project"
  - tool: EAS build pipeline (Android/iOS)
    must_not_break: true
    note: "Native mobile deploys untouched by this feature"

platform_coverage:
  CI:
    - GitHub Actions ubuntu-latest
  Laptop (fallback deploy):
    macOS: [13.x, 14.x, 15.x]
    Linux: [Ubuntu 22.04, Ubuntu 24.04]
  Node:
    - 20.x
  Firebase CLI:
    - ">= 13.0"
  Production target:
    - Firebase Hosting (managed; no platform version applicable)

deployment_assumptions:
  - "Deploys are atomic — Firebase Hosting flips the CDN pointer only after full upload, so no partial release is ever served."
  - "Re-running the deploy workflow on the same SHA is idempotent — same source + same lockfile → byte-equivalent bundle served."
  - "Rollback is out-of-band: `firebase hosting:rollback` (laptop) or Firebase console. No rollback workflow needed."
  - "ci.yml is the sole quality gate. deploy-web.yml MUST NOT duplicate tsc/eslint/jest — those are CI's job."
  - "Deploy does not touch Firestore data, Firebase Auth users, or any other Firebase service on project grocery-list-cad."
  - "Service account scope is Firebase Hosting Admin only — deploy cannot accidentally modify Firestore rules or Auth config."
  - "Failure of deploy-web.yml leaves the prior hosting release active. No partial state possible on failure."
  - "Manual laptop fallback produces a deploy indistinguishable from a CI deploy (identical firebase.json + lockfile + node 20)."

# Notes for DISTILL:
# - This is an infra feature; acceptance scenarios target CI workflow behavior
#   and hosting outcomes, not application code paths.
# - Scenarios should parametrize over (ci-runner happy path, laptop-fallback path)
#   since both are supported deploy mechanisms.
# - Scenarios do NOT need to parametrize over macOS/Linux laptop variants —
#   Firebase CLI behavior is identical across them.
