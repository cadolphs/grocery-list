journey:
  id: publish-web
  feature: web-prod-deploy
  actor: clemens
  goal: Push to main results in a live web build at a stable public URL within 5 minutes.
  trigger: git push origin main
  preconditions:
    - firebase.json checked in at repo root
    - .firebaserc points at grocery-list-cad
    - FIREBASE_SERVICE_ACCOUNT secret set in GitHub repo
    - CI workflow ci.yml passing for the commit
  steps:
    - id: s1
      name: push
      actor: clemens
      action: git push origin main
      output: commit on origin/main
      emotion: neutral
    - id: s2
      name: ci
      actor: github-actions
      action: run ci.yml (tsc, eslint, jest, audit)
      output: green check on commit
      emotion: relief
      on_failure: stop; prior build stays live
    - id: s3
      name: build
      actor: github-actions
      action: run deploy-web.yml -> npm ci && npm run build in /web
      output: web/dist/ populated
      emotion: neutral
      on_failure: stop; prior build stays live
    - id: s4
      name: deploy
      actor: github-actions
      action: firebase-hosting-deploy with service account
      output: new hosting release, URL logged
      emotion: anticipation
      on_failure: log; manual `firebase deploy` fallback available
    - id: s5
      name: verify
      actor: clemens
      action: open https://grocery-list-cad.web.app
      output: latest build served
      emotion: confident
  shared_artifacts:
    - name: web_dist
      path: /web/dist
      source: step s3 (build)
      consumer: step s4 (deploy)
    - name: firebase_hosting_config
      path: firebase.json
      source: repo (US-01)
      consumer: firebase CLI
    - name: project_alias
      path: .firebaserc
      source: repo (US-01)
      consumer: firebase CLI
    - name: deploy_credential
      path: github-secret://FIREBASE_SERVICE_ACCOUNT
      source: Firebase console (manual provisioning)
      consumer: step s4
    - name: prod_url
      value: https://grocery-list-cad.web.app
      source: Firebase Hosting default
      consumer: user + docs/deploy.md
  kpis:
    - deploy_lead_time_p95_seconds: 300
    - deploy_success_rate_30d: 0.95
    - rollback_time_seconds: 120
    - availability_monthly: 0.999
